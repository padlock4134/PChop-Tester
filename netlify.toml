[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions."crm-lead-hunter"]
  timeout = 60

[functions."crm-lead-hunter-import"]
  timeout = 26

[build.environment]
  NODE_VERSION = "18"

[dev]
  framework = "vite"
  targetPort = 3000
  autoLaunch = false

# ✅ Standard SPA redirect for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ✅ Minimal required headers for JS files
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type = "application/javascript"
