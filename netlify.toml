[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[dev]
  framework = "vite"
  targetPort = 3000
  autoLaunch = false

# Route /api/chefFreddieQuery to the Netlify function
[[redirects]]
  from = "/api/chefFreddieQuery"
  to = "/.netlify/functions/chefFreddieQuery"
  status = 200

# ✅ Standard SPA redirect for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ✅ Minimal required headers for JS files
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type = "application/javascript"

# Service worker must not be cached by the browser
[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "no-cache, no-store, must-revalidate"

# Manifest needs correct MIME type
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
