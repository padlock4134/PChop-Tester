[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[dev]
  framework = "vite"
  targetPort = 3000
  autoLaunch = false

# ✅ Always let function calls through
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

# ✅ Handle form submissions explicitly
[[redirects]]
  from = "/"
  to = "/.netlify/functions/handle-form"
  status = 200
  force = true
  conditions = {Form = "*"}

# ✅ Standard SPA redirect (must come last to avoid overriding functions)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ✅ Minimal required headers for JS files
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type = "application/javascript"
