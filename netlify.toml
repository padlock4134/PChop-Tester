[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Form submissions handling
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Handle form submissions
[[redirects]]
  from = "/"
  to = "/.netlify/functions/handle-form"
  status = 200
  force = true
  conditions = {Form = "*"}

[build.environment]
  NODE_VERSION = "18"

[dev]
  framework = "vite"
  targetPort = 3000
  autoLaunch = false

# Fix for the root URL to bypass asset handling
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Fix for ES modules MIME type issue - minimal required headers
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type = "application/javascript"

# Standard SPA redirect
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
