<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>PorkChop</title>
    <link rel="icon" href="/favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&display=swap" rel="stylesheet">
    
    <!-- Google Maps JavaScript API with Places library -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places" async defer></script>
    
    <!-- A-Frame for 3D virtual practice scenes -->
    <script src="/lib/aframe.min.js"></script>
    
    <!-- MediaPipe Pose for camera-based motion tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.min.js" crossorigin="anonymous"></script>
    
    <!-- PWA Support for Android and iOS -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#003366" />
    
    <!-- iOS specific PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PorkChop" />
    <link rel="apple-touch-icon" href="/logo.png" />
  </head>
  <body class="bg-sand font-retro">
    <div id="root"></div>
    <script>
      // Emergency compatibility shim for stale bundles referencing removed symbol.
      // TODO: remove after all deployments have rotated to current chunks.
      window.PracticeModeSwitch = window.PracticeModeSwitch || function PracticeModeSwitchShim() { return null; };
      var PracticeModeSwitch = window.PracticeModeSwitch;
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <form name="demo-request" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="company" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="datetime-local" name="preferredTime" />
    </form>
    <form name="story-submission" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="story"></textarea>
    </form>
  </body>
</html>
