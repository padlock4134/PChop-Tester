<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PorkChop — Offline</title>
  <meta name="theme-color" content="#003366" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Bree Serif', Georgia, serif;
      background: #F5F5DC;
      color: #003366;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border: 4px solid #003366;
      border-radius: 1rem;
      padding: 3rem 2rem;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }
    .emoji { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.75rem; margin-bottom: 0.75rem; }
    p { font-size: 1rem; color: #555; margin-bottom: 1.5rem; line-height: 1.5; }
    button {
      background: #003366;
      color: #A8E6CF;
      border: 2px solid #000;
      border-radius: 0.5rem;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    button:hover { background: #A8E6CF; color: #003366; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">📡</div>
    <h1>You're Offline</h1>
    <p>PorkChop needs an internet connection to load. Check your Wi-Fi or cellular data and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
