<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PorkChop Demo</title>
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/src/components/AboutUs.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" />
    <style>
        .demo-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
        }
        
        .demo-video-container {
            width: 100%;
            margin: 10px 0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border: 2px solid #2a4d69; /* Blue border */
        }
        
        .demo-video {
            width: 100%;
            display: block;
        }
        
        .about-section {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        
        .about-hero {
            padding: 10px 0;
        }
        
        .about-title {
            margin: 5px 0;
            color: #2a4d69; /* Matching blue color */
        }
        
        .about-tagline {
            margin: 5px 0 25px;
            color: #2a4d69; /* Matching blue color */
            font-weight: 500;
        }

        .video-description {
            text-align: center;
            margin-bottom: 20px;
            color: #2a4d69;
            font-size: 1.1rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="about-page-container">
        <div class="about-header">
            <div class="about-nav-links">
                <a href="/" class="about-back-arrow" aria-label="Back to Home">
                    ← Back to Home
                </a>
                <a href="/TenantWellness" class="about-back-arrow about-back-to-tw" aria-label="Back to Tenant Wellness">
                    ← Back to PorkChop Perks
                </a>
                <a href="/KitchenComebacks" class="about-back-arrow about-back-to-kc" aria-label="Back to Kitchen Comebacks">
                    ← Back to Kitchen Comebacks
                </a>
            </div>
            <img src="/logo.png" alt="PorkChop Logo" class="about-logo" />
        </div>
        
        <section class="about-hero">
            <h1 class="about-title">PorkChop Demo</h1>
            <p class="about-tagline">See our platform in action</p>
        </section>
        
        <div class="demo-content">
            <section class="about-section">
                <p class="video-description">Watch how our platform transforms your cooking experience with intuitive features and seamless navigation.</p>
                
                <div class="demo-video-container">
                    <video class="demo-video" controls autoplay>
                        <source src="/PorkChop - Google Chrome 2025-06-28 12-15-21.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </section>
        </div>
    </div>

    <script>
        // Set video volume to 50% when page loads
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.querySelector('.demo-video');
            if (video) {
                video.volume = 0.5;
            }
            
            // Add smooth scrolling for anchor links
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth'
                        });
                    }
                });
            });
        });
    </script>
</body>
</html>
